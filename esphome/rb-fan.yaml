esphome:
  name: rb-fan

esp8266:
  board: d1_mini
  restore_from_flash: true
  early_pin_init: false

preferences:
  flash_write_interval: 5min

# saving on memory
mdns:
  disabled: true

# Enable logging
logger:
  baud_rate: 0 # disable UART

# Enable Home Assistant API
api:
  #password: !secret api.password
  encryption:
    key: !secret api.key

ota:
  - platform: esphome
    password: !secret ota.password

wifi:
  ssid: !secret wifi.home.ssid
  password: !secret wifi.home.password
  domain: ""

sensor:
  - platform: pulse_counter
    pin:
      number: D2
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Fan RPM"
    id: fan_rpm
    unit_of_measurement: 'RPM'
    update_interval: 2s

output:
  - platform: esp8266_pwm
    id: fan_pwm
    pin: D1
    frequency: "10000 Hz"

    # min_power: 0%
    # max_power: 100%

fan:
  - platform: speed
    output: fan_pwm
    name: "Fan speed"
    id: robi_fan
