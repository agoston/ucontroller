  #         id: robi_fan_pwm
  #         level: "100%"

# https://esphome.io/components/esp8266
esp8266:
  board: d1_mini_lite
  restore_from_flash: true
  early_pin_init: false

############################
# d1_mini_lite has 1MB -- DO NOT ADD ANY FEATURES AND/OR UPGRADE, there is no memory left, will OOMkill regularly!
# disable OTA or encryption if further OOMKills occur.
############################

# RX/TX: also usable, GPIO3/GPIO1; used in Serial.print()/read() & flashing
# D0 is clean
# D1: I2C SCL pin
# D2: I2C SDA pin
# D3+D4 is 12Kohm pullup
# D5+D6+D7 is clean (=serial, but normally unused)
# D8 is pulldown
# A0 is clean (analog, but also works digital)


preferences:
  flash_write_interval: 5min

# Enable logging
logger:
  baud_rate: 0 # disable UART

# Enable Home Assistant API
api:
  #password: !secret api.password
  encryption:
    key: !secret api.key
  reboot_timeout: "0s"

# saving on memory
mdns:
  disabled: true

ota:
  - platform: esphome
    password: !secret ota.password

wifi:
  ssid: !secret wifi.home.ssid
  password: !secret wifi.home.password
  domain: ""

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Ketel Fallback Hotspot"
    password: !secret wifi.ap.password

sensor:
  - platform: wifi_signal
    name: Signal strength

  - platform: uptime
    name: Uptime

switch:
  - platform: gpio
    pin: 
      number: D8
      # inverted: true
    id: ketel_relay
    name: "Ketel relay"
    restore_mode: RESTORE_DEFAULT_OFF

