esphome:
  name: robi

esp8266:
  board: d1_mini_lite
  restore_from_flash: true
  early_pin_init: false

############################
# d1_mini_lite has 1MB flash -- DO NOT ADD HEAVY FEATURES, there is little memory left, might OOMkill!
# Disable OTA or encryption if further OOMKills occur.
############################

# PINOUT REFERENCE:
# RX/TX: also usable as GPIO3/GPIO1. Used for flashing.
# D0: clean
# D1: I2C SCL pin (clean)
# D2: I2C SDA pin (clean)
# D3, D4: 12Kohm pullup
# D5, D6, D7: clean (hardware SPI, normally unused)
# D8: pulldown
# A0: clean (analog, but also works digital)

preferences:
  flash_write_interval: 5min

mdns:
  disabled: true

logger:
  baud_rate: 0 # disable UART to save memory and free up RX/TX pins

api:
  encryption:
    key: !secret api.key
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret ota.password

wifi:
  ssid: !secret wifi.home.ssid
  password: !secret wifi.home.password
  domain: ""

sensor:
  - platform: wifi_signal
    name: Signal strength
  - platform: uptime
    name: Uptime
  - platform: dallas_temp
    address: 0x0000000000000000
    name: "Temperature"
    id: temp_sensor

# D3 has an integrated 3.3V 12Kohm pullup on the d1 lite, which works perfectly with the DS18B20 temperature sensor without external resistors.
# Note: The 'dallas_temp' sensor below communicates over the 1-Wire protocol. 
# This 'one_wire' component defines the physical bus (pin D3) that the 'dallas_temp' sensor connects to.
one_wire:
  - platform: gpio
    pin: D3


globals:
  - id: show_temp
    type: bool
    initial_value: 'false'

script:
  - id: show_temp_script
    mode: restart
    then:
      - globals.set:
          id: show_temp
          value: 'true'
      - delay: 2s
      - globals.set:
          id: show_temp
          value: 'false'


sun:
  latitude: 47.46111654725821
  longitude: 18.94606336461776
  id: sun_sensor

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Budapest

# Smooth dimming based on sun elevation. 
# ESPHome's TM1637 component uses an intensity scale from 0 to 7, exactly like the original C++ library.
# -10 degrees (full dark/night) -> intensity 0 (minimum brightness, but still on)
# +10 degrees (full day) -> intensity 5 (~71% brightness, matching original code to avoid being overly bright)
# In between (dawn/dusk) -> smooth interpolation
display:
  - platform: tm1637
    id: tm1637_display
    clk_pin: D5
    dio_pin: D6
    update_interval: 500ms
    lambda: |-
      float elev = id(sun_sensor).elevation();
      if (!std::isnan(elev)) {
        int brightness = 5;
        if (elev < -10.0f) {
          brightness = 0;
        } else if (elev > 10.0f) {
          brightness = 5;
        } else {
          brightness = (int)(((elev + 10.0f) / 20.0f) * 5.0f);
        }
        id(tm1637_display).set_intensity(brightness);
      }
      if (id(show_temp)) {
        if (id(temp_sensor).has_state()) {
          it.printf("%.1f", id(temp_sensor).state);
        } else {
          it.print("----");
        }
      } else {
        auto time = id(sntp_time).now();
        if (time.is_valid()) {
          it.strftime("%H%M", time);
        } else {
          it.print("----");
        }
      }

# D4 has an integrated 3.3V 12Kohm pullup on the d1 lite.
# It is also physically connected to the builtin LED, so pressing the button completes the circuit and lights it up in hardware.
binary_sensor:
  - platform: gpio
    pin:
      number: D4
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Button"
    on_press:
      - script.execute: show_temp_script
